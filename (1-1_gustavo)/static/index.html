<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agente de Previsão de Churn</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
  h1 { font-size: 22px; }
  label { display: block; margin-top: 12px; font-weight: bold; }
  input, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
  button { margin-top: 20px; padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:disabled { background: #999; }
  #resultado { margin-top: 24px; padding: 16px; background: white; border-radius: 8px; display: none; }
  .risco-alto { border-left: 6px solid #dc2626; }
  .risco-moderado { border-left: 6px solid #d97706; }
  .risco-baixo { border-left: 6px solid #16a34a; }
  .prob { font-size: 28px; font-weight: bold; }
</style>
</head>
<body>
  <h1>Agente de Previsão de Churn</h1>
  <p>Preencha os dados do cliente para o agente avaliar o risco de cancelamento.</p>

  <label>Tempo de contrato (meses)</label>
  <input type="number" id="tenure" value="2">

  <label>Cobrança mensal (R$)</label>
  <input type="number" id="monthly" value="95.0" step="0.01">

  <label>Total gasto até agora (R$)</label>
  <input type="number" id="total" value="190.0" step="0.01">

  <label>Tipo de contrato</label>
  <select id="contrato">
    <option value="mensal">Mensal (padrão)</option>
    <option value="anual">1 ano</option>
    <option value="bianual">2 anos</option>
  </select>

  <button id="btnAnalisar" onclick="analisar()">Analisar cliente</button>

  <div id="resultado"></div>

<script>
async function analisar() {
  const btn = document.getElementById("btnAnalisar");
  const resultado = document.getElementById("resultado");
  btn.disabled = true;
  btn.textContent = "Analisando...";
  resultado.style.display = "none";

  const contrato = document.getElementById("contrato").value;

  const payload = {
    tenure: parseInt(document.getElementById("tenure").value),
    MonthlyCharges: parseFloat(document.getElementById("monthly").value),
    TotalCharges: parseFloat(document.getElementById("total").value),
    Contract_One_year: contrato === "anual" ? 1 : 0,
    Contract_Two_year: contrato === "bianual" ? 1 : 0
  };

  try {
    const resp = await fetch("/prever", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();

    let classe = "risco-baixo";
    if (data.nivel_risco.includes("ALTO")) classe = "risco-alto";
    else if (data.nivel_risco.includes("MODERADO")) classe = "risco-moderado";

    resultado.className = classe;
    resultado.innerHTML = `
      <div class="prob">${(data.probabilidade_churn * 100).toFixed(1)}%</div>
      <div><strong>${data.nivel_risco}</strong></div>
      <p>${data.explicacao.replace(/\n/g, "<br>")}</p>
      <small>Fonte da explicação: ${data.llm_provider}</small>
    `;
    resultado.style.display = "block";
  } catch (e) {
    resultado.className = "";
    resultado.innerHTML = "<p>Erro ao conectar com a API. Verifique se o servidor está rodando.</p>";
    resultado.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "Analisar cliente";
  }
}
</script>
</body>
</html>
